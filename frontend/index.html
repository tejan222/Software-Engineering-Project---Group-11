<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Software Engineering Project - Group 11 - Individual</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            Software Engineering Project - Group 11 - Individual
        </div>
        <div class="nav-buttons">
            <button id="loginButton" onclick="window.location.href = 'login.html'">
                Login
            </button>
            <button id="signupButton" onclick="window.location.href = 'signup.html'">
                Sign Up
            </button>
            <button id="historyButton" onclick="window.location.href = 'history.html'" style="display: none;">
                Conversation History
            </button>
            <button id="logoutButton" onclick="logoutUser()" style="display: none;">
                Logout
            </button>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1>Welcome! Ask multiple AI models!</h1>
            <p>This is Group 11 Software Engineering Project</p>
            <p>Supported LLMs: Qwen 2.5, Llama 3.2, Mistral 7B, Phi-3 Mini, DeepSeek r1</p>
            <p id="authStatus">Checking login status...</p>
            <div class="new-chat-container">
                <button onclick="startNewChat()">
                    New Chat
                </button>
            </div>
        </section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
