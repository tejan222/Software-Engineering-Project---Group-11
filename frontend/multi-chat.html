<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-LLM Chat</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .llm-selector { display: flex; gap: 20px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .llm-checkbox { display: flex; align-items: center; gap: 6px; font-size: 15px; cursor: pointer; }
        .llm-checkbox input { width: 16px; height: 16px; cursor: pointer; }
        .responses-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 25px; text-align: left; }
        .response-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: #f9f9f9; min-height: 120px; }
        .response-card h3 { margin: 0 0 10px 0; font-size: 15px; color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 6px; }
        .response-card .response-text { font-size: 14px; color: #444; line-height: 1.6; white-space: pre-wrap; }
        .response-card .response-time { font-size: 11px; color: #999; margin-top: 10px; text-align: right; }
        .response-card.loading .response-text { color: #aaa; font-style: italic; }
        .response-card.error .response-text { color: #e53935; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Software Engineering Project - Group 11</div>
        <div class="nav-buttons">
            <button onclick="window.location.href='index.html'">Home</button>
            <button onclick="window.location.href='history.html'">Conversation History</button>
            <button onclick="logoutUser()">Logout</button>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1>Multi-LLM Chat</h1>
            <p id="authStatus">Checking login status...</p>
            <p>Select LLMs to query:</p>
            <div class="llm-selector">
                <label class="llm-checkbox">
                    <input type="checkbox" value="Ollama (Local)" checked> Ollama (Local)
                </label>
                <label class="llm-checkbox">
                    <input type="checkbox" value="Gemini"> Gemini
                </label>
            </div>
            <div class="search-container">
                <input type="text" id="multiPromptInput" placeholder="Ask me anything...">
                <button type="button" onclick="sendMultiChat()">ASK ALL</button>
            </div>
            <div class="responses-grid" id="responsesGrid"></div>
            <div id="viewHistoryBtn" style="display:none; text-align:center; margin-top:20px;">
                <button onclick="window.location.href='history.html'">View Full Responses in History</button>
            </div>
        </section>
    </main>
    <script>
        const baseBackend = 'http://localhost:3000';

        async function checkAuth() {
            try {
                const res = await fetch(baseBackend + '/api/auth/me', { credentials: 'include' });
                const data = await res.json();
                if (data.user) {
                    document.getElementById('authStatus').textContent = 'Logged in as: ' + data.user.email;
                } else {
                    window.location.href = 'login.html';
                }
            } catch(e) {
                document.getElementById('authStatus').textContent = 'Could not connect to backend.';
            }
        }

        async function logoutUser() {
            await fetch(baseBackend + '/api/auth/logout', { method: 'POST', credentials: 'include' });
            window.location.href = 'login.html';
        }

        async function sendMultiChat() {
            event.preventDefault();
            console.log('sendMultiChat called!');
            var promptEl = document.getElementById('multiPromptInput');
            var prompt = promptEl.value.trim();
            if (!prompt) { alert('Please enter a prompt!'); return; }

            var checkboxes = document.querySelectorAll('.llm-checkbox input:checked');
            var selectedLLMs = [];
            checkboxes.forEach(function(cb) { selectedLLMs.push(cb.value); });
            console.log('Selected:', selectedLLMs);

            if (selectedLLMs.length === 0) { alert('Please select at least one LLM!'); return; }

            var grid = document.getElementById('responsesGrid');
            grid.innerHTML = '';
            selectedLLMs.forEach(function(llm) {
                var safeId = llm.replace(/[^a-zA-Z0-9]/g, '');
                var card = document.createElement('div');
                card.className = 'response-card loading';
                card.id = 'card-' + safeId;
                card.innerHTML = '<h3>' + llm + '</h3><div class="response-text">Waiting for response...</div>';
                grid.appendChild(card);
            });

            try {
                console.log('Fetching...');
                var res = await fetch(baseBackend + '/api/multi-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ prompt: prompt, llms: selectedLLMs })
                });
                console.log('Status:', res.status);
                var data = await res.json();
                console.log('Data:', data);

                if (!res.ok) { alert(data.message || 'Error'); return; }
                window.location.href = 'history.html';
                document.getElementById('viewHistoryBtn').style.display = 'block';
                data.results.forEach(function(result) {
                    var safeId = result.llm.replace(/[^a-zA-Z0-9]/g, '');
                    var card = document.getElementById('card-' + safeId);
                    if (card) {
                        card.classList.remove('loading');
                        if (!result.success) card.classList.add('error');
                        card.querySelector('.response-text').textContent = result.reply;
                        var timeDiv = document.createElement('div');
                        timeDiv.className = 'response-time';
                        timeDiv.textContent = 'Response time: ' + result.responseTime + 'ms';
                        card.appendChild(timeDiv);
                    }
                });
            } catch(err) {
                console.error('Error:', err);
                grid.innerHTML = '<p style="color:red">Error: ' + err.message + '</p>';
            }
        }

        checkAuth();
    </script>
</body>
</html>
