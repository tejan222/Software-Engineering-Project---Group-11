<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conversation</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            Software Engineering Project - Group 11
        </div>

        <div class="nav-buttons">
            <button onclick="window.location.href='history.html'">
                Conversation History
            </button>
            <button onclick="logoutUser()">
                Logout
            </button>
        </div>
    </header>

    <main class="conversation-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="customize-panel">
        <h3>Customize</h3>

        <label class="section-label">
            <input type="checkbox" id="specializedMode" onchange="toggleSpecializedMode(this)">
        </label>
        <div id="specializedOptions" style="display:none; margin-left:10px;">
            <label><input type="radio" name="specializedType" value="math"> Math</label><br>
            <label><input type="radio" name="specializedType" value="weather"> Weather</label>
        </div>

        <hr>
        <strong>Model Selection</strong>

        <div class="model-section">
            <label>
                <input type="checkbox" id="useLocal" onchange="toggleLocalModels(this)"> Local            </label>
            <div id="localModels" style="display:none; margin-left:10px;">
                <label><input type="radio" name="modelChoice" value="local-qwen2.5"> qwen2.5</label><br>
                <label><input type="radio" name="modelChoice" value="local-mistral"> mistral</label><br>
                <label><input type="radio" name="modelChoice" value="local-gemma"> gemma</label>
            </div>
        </div>

        <div class="model-section">
            <label>
                <input type="checkbox" id="usePublic" onchange="togglePublicModels(this)"> Public
            </label>
            <div id="publicModels" style="display:none; margin-left:10px;">
                <label><input type="radio" name="modelChoice" value="public-gemini"> Gemini</label><br>
                <label><input type="radio" name="modelChoice" value="public-llama3"> Llama 3 (Groq) </label>            </div>
        </div>

        <hr>
        <label class="section-label">
            <input type="checkbox" id="threeLLMToggle">
            Have 3 LLMs respond
        </label>
    </aside>

    <!-- MAIN CHAT AREA -->
    <section class="hero">
        <button onclick="window.location.href='history.html'">&lt; Back</button>
        <h1 id="conversationTitle">New Chat</h1>
        <div id="chatBox"></div>
        <div class="search-container">
            <input type="text" id="promptInput" placeholder="Ask me anything...">
            <button onclick="sendPrompt()">ASK</button>
        </div>
    </section>

</main>

    <script src="js/app.js"></script>
</body>
</html>
